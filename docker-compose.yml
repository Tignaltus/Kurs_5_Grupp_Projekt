services:
    service-registry:
      build: ./Service_registry
      container_name: service-registry
      ports:
        - "8761:8761"

    api-gateway:
        build: ./api-gateway
        container_name: api-gateway
        ports:
           - "8080:8080"
        depends_on:
           - service-registry
        environment:
           EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/


    author-service:
         build: ./author-microservice
         container_name: author-service
         ports:
           - "8081:8081"
         environment:
           EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/


    loan-service:
         build: ./loan-service
         container_name: loan-service
         ports:
           - "8082:8082"
         environment:
           EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/


    book-service:
         build: ./book-service
         container_name: book-service
         ports:
           - "8083:8083"
         environment:
           EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
